# Owly Post — self-hosted stack: app + worker/scheduler + Postgres.
#
# Copy .env.example to .env and fill it in first. Prefer an external Postgres by
# pointing DATABASE_URL at it and removing the postgres service + the DATABASE_URL
# overrides below.
#
#   docker compose up -d --build

x-app-env: &app-env
  NODE_ENV: production
  # Reach the bundled Postgres over the compose network (overrides the host
  # value in .env). Point DATABASE_URL in .env at an external database and drop
  # this to use that instead. POSTGRES_PASSWORD must be set in .env — the
  # stack refuses to start otherwise (see below).
  DATABASE_URL: postgres://${POSTGRES_USER:-owly}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-owly}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-owly}
      # No default: an unset/empty POSTGRES_PASSWORD aborts `docker compose up`
      # rather than silently booting the database with a well-known password.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-owly}
    ports:
      # Bound to loopback only: reachable for host tooling (`pnpm migrate` /
      # `pnpm seed`) but never exposed on the machine's public interfaces.
      # Other compose services reach Postgres over the internal network, not
      # this mapping.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-owly} -d ${POSTGRES_DB:-owly}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: applies pending migrations, then exits. App and worker wait for it.
  migrate:
    build: .
    image: owlypost:local
    command: ["node", "scripts/migrate.ts"]
    env_file: .env
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    image: owlypost:local
    restart: unless-stopped
    env_file: .env
    environment: *app-env
    ports:
      # Bound to loopback: put a reverse proxy (TLS + optional auth) in front,
      # as the app has no authentication of its own. Change to "3000:3000" only
      # if you deliberately want it on every interface.
      - "127.0.0.1:3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    image: owlypost:local
    restart: unless-stopped
    command: ["node", "scripts/worker.ts"]
    env_file: .env
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
